name: Build Neon Car Launcher APK

# Roda automaticamente a cada push na branch main, ou manualmente pela aba Actions.
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Baixa os arquivos enviados por você
        uses: actions/checkout@v4
        with:
          path: payload

      - name: Instala o Flutter (feito pelo próprio GitHub, sem custo)
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Gera o esqueleto padrão de um projeto Flutter/Android
        run: flutter create --org com.neoncar --project-name neon_car_launcher project

      - name: Substitui o esqueleto pelos arquivos personalizados do launcher
        run: |
          cp payload/pubspec.yaml project/pubspec.yaml
          cp payload/lib/main.dart project/lib/main.dart
          cp payload/AndroidManifest.xml project/android/app/src/main/AndroidManifest.xml
          rm -rf project/assets
          cp -r payload/assets project/assets

      - name: Injeta o MainActivity.kt e o CarMediaListenerService.kt nativos com o pacote correto
        run: |
          GENERATED_MAIN_ACTIVITY=$(find project/android -name "MainActivity.kt" | head -n1)
          echo "MainActivity gerado em: $GENERATED_MAIN_ACTIVITY"
          TARGET_DIR=$(dirname "$GENERATED_MAIN_ACTIVITY")
          PACKAGE_NAME=$(grep -m1 '^package ' "$GENERATED_MAIN_ACTIVITY" | sed 's/^package //')
          echo "Pacote detectado: $PACKAGE_NAME"
          sed "s/__PACKAGE__/$PACKAGE_NAME/" payload/android/MainActivity.kt > "$GENERATED_MAIN_ACTIVITY"
          sed "s/__PACKAGE__/$PACKAGE_NAME/" payload/android/CarMediaListenerService.kt > "$TARGET_DIR/CarMediaListenerService.kt"

      - name: Usa sempre a mesma chave de assinatura de debug (evita builds com assinaturas diferentes)
        run: |
          mkdir -p "$HOME/.android"
          base64 -d payload/android/debug_keystore_base64.txt > "$HOME/.android/debug.keystore"
          echo "Chave de debug fixa instalada em $HOME/.android/debug.keystore"

      - name: Baixa as dependências do projeto
        working-directory: project
        run: flutter pub get

      - name: Corrige plugin antigo flutter_bluetooth_serial (jcenter + namespace ausente)
        run: |
          BT_DIR=$(find "$HOME/.pub-cache" -maxdepth 6 -type d -name "flutter_bluetooth_serial-*" | head -n1)
          if [ -n "$BT_DIR" ]; then
            echo "Pasta do plugin: $BT_DIR"
            GRADLE_FILE="$BT_DIR/android/build.gradle"
            MANIFEST_FILE="$BT_DIR/android/src/main/AndroidManifest.xml"
            sed -i 's/jcenter()/mavenCentral()/g' "$GRADLE_FILE"
            if [ -f "$MANIFEST_FILE" ] && ! grep -q "namespace" "$GRADLE_FILE"; then
              PKG=$(grep -m1 -o 'package="[^"]*"' "$MANIFEST_FILE" | sed 's/package="//;s/"//')
              echo "Namespace detectado: $PKG"
              sed -i "/android {/a namespace '$PKG'" "$GRADLE_FILE"
            fi
          else
            echo "Plugin flutter_bluetooth_serial não encontrado no pub-cache (ok se não for usado)."
          fi

      - name: Ajusta compileSdk para 36 no app e em todos os plugins baixados
        run: |
          FILES=$(find "$HOME/.pub-cache" -maxdepth 8 -type f \( -name "build.gradle" -o -name "build.gradle.kts" \) -path "*/android/*" 2>/dev/null)
          FILES="$FILES $(find project/android -maxdepth 4 -type f \( -name "build.gradle" -o -name "build.gradle.kts" \) 2>/dev/null)"
          for f in $FILES; do
            sed -i -E 's/compileSdkVersion[[:space:]]+flutter\.compileSdkVersion/compileSdkVersion 36/' "$f"
            sed -i -E 's/compileSdkVersion[[:space:]]+[0-9]+/compileSdkVersion 36/' "$f"
            sed -i -E 's/compileSdk[[:space:]]*=[[:space:]]*flutter\.compileSdkVersion/compileSdk = 36/' "$f"
            sed -i -E 's/compileSdk[[:space:]]*=[[:space:]]*[0-9]+/compileSdk = 36/' "$f"
            sed -i -E 's/compileSdk[[:space:]]+flutter\.compileSdkVersion/compileSdk 36/' "$f"
            sed -i -E 's/compileSdk[[:space:]]+[0-9]+/compileSdk 36/' "$f"
          done
          echo "Arquivos ajustados para compileSdk 36:"
          for f in $FILES; do
            if grep -q "compileSdk" "$f" 2>/dev/null; then
              echo "$f:"
              grep -n "compileSdk" "$f"
            fi
          done

      - name: Compila o APK final (release, um arquivo por arquitetura)
        working-directory: project
        run: flutter build apk --release --split-per-abi

      - name: Publica os APKs prontos para download
        uses: actions/upload-artifact@v4
        with:
          name: neon-car-launcher-apk
          path: project/build/app/outputs/flutter-apk/*.apk
